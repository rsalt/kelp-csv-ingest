<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CSV ingest</title>
  <style>
    :root {
      --bg: #0f1419;
      --card: #1a2332;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #3d8bfd;
      --accent-hover: #5ca0ff;
      --danger: #f87171;
      --border: #2d3a4f;
      --radius: 10px;
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .wrap {
      max-width: 520px;
      margin: 0 auto;
      padding: 2.5rem 1.25rem;
    }
    h1 {
      font-size: 1.35rem;
      font-weight: 600;
      margin: 0 0 0.35rem;
      letter-spacing: -0.02em;
    }
    p.sub {
      margin: 0 0 1.75rem;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.35rem;
      margin-bottom: 1.25rem;
    }
    button {
      width: 100%;
      padding: 0.75rem 1rem;
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover:not(:disabled) { background: var(--accent-hover); }
    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    .msg {
      margin-top: 0.85rem;
      font-size: 0.88rem;
      min-height: 1.25rem;
    }
    .msg.err { color: var(--danger); }
    .msg.ok { color: #86efac; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    th, td {
      padding: 0.5rem 0.35rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    th { color: var(--muted); font-weight: 500; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.04em; }
    tr:last-child td { border-bottom: none; }
    td:last-child { text-align: right; font-variant-numeric: tabular-nums; }
    .empty {
      color: var(--muted);
      font-size: 0.88rem;
      padding: 0.25rem 0;
    }
    footer {
      margin-top: 2rem;
      font-size: 0.78rem;
      color: var(--muted);
    }
    footer code { font-size: 0.85em; background: var(--bg); padding: 0.15rem 0.4rem; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>CSV → Postgres</h1>
    <p class="sub">Loads the file from <code>CSV_FILE_PATH</code>, then shows age distribution.</p>

    <div class="card">
      <button type="button" id="run">Import CSV into database</button>
      <div class="msg" id="msg" aria-live="polite"></div>
    </div>

    <div class="card">
      <table id="tbl" aria-label="Age distribution">
        <thead>
          <tr><th>Age group</th><th>% of users</th></tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="2" class="empty">No data yet — run import or check DB.</td></tr>
        </tbody>
      </table>
    </div>

    <footer>
      API: <code>GET /api/report</code> · <code>POST /api/ingest</code> · <code>GET /health</code>
    </footer>
  </div>
  <script>
    const msg = document.getElementById('msg');
    const tbody = document.getElementById('tbody');
    const btn = document.getElementById('run');

    function setMsg(text, cls) {
      msg.textContent = text || '';
      msg.className = 'msg' + (cls ? ' ' + cls : '');
    }

    function renderReport(rows) {
      tbody.replaceChildren();
      if (!rows || !rows.length) {
        const tr = document.createElement('tr');
        const td = document.createElement('td');
        td.colSpan = 2;
        td.className = 'empty';
        td.textContent = 'No rows in database.';
        tr.appendChild(td);
        tbody.appendChild(tr);
        return;
      }
      for (const r of rows) {
        const tr = document.createElement('tr');
        const td1 = document.createElement('td');
        td1.textContent = r.age_group;
        const td2 = document.createElement('td');
        td2.textContent = String(r.pct);
        tr.appendChild(td1);
        tr.appendChild(td2);
        tbody.appendChild(tr);
      }
    }

    async function loadReport() {
      const res = await fetch('/api/report');
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || 'Report request failed');
      renderReport(data.report);
    }

    document.getElementById('run').addEventListener('click', async () => {
      btn.disabled = true;
      setMsg('Importing…');
      try {
        const res = await fetch('/api/ingest', { method: 'POST' });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || 'Import failed');
        setMsg('Imported ' + data.inserted + ' row(s).', 'ok');
        renderReport(data.report);
      } catch (e) {
        setMsg(e.message, 'err');
      } finally {
        btn.disabled = false;
      }
    });

    loadReport().catch(() => {
      tbody.replaceChildren();
      const tr = document.createElement('tr');
      const td = document.createElement('td');
      td.colSpan = 2;
      td.className = 'empty';
      td.textContent = 'Could not load report (is the server up?).';
      tr.appendChild(td);
      tbody.appendChild(tr);
    });
  </script>
</body>
</html>
